.phase-desc{font-size:13px;color:#5f5e5a;line-height:1.65}

.countdown-label{font-size:13px;opacity:0.85}
.countdown-sub{font-size:12px;opacity:0.7;margin-top:2px}
.week-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}

.day-name{font-weight:600;font-size:13px}

@media(max-width:500px){.allure-grid{grid-template-columns:repeat(2,1fr)}}

let currentPhase=0, currentWeek=0;

function getDaysToRace(){
  const race=new Date('2026-07-05');
  const today=new Date();
  today.setHours(0,0,0,0);
  race.setHours(0,0,0,0);
  return Math.round((race-today)/(1000*60*60*24));
}

function renderCountdown(){
  const el=document.getElementById('countdown');
  if(!PHASES[currentPhase].countdown){el.innerHTML='';return;}
  const d=getDaysToRace();
  const msg=d>0?`avant le départ`:d===0?`C'est aujourd'hui !`:`Course passée — bien joué !`;
  el.innerHTML=`<div class="countdown">
    <div><div class="countdown-num">${Math.abs(d)}</div></div>
    <div><div style="font-size:18px;font-weight:700">jours</div>
    <div class="countdown-label">${msg}</div>
    <div class="countdown-sub">GSC Run Set & Match — 5 juillet 2026</div></div>
  </div>`;
}

function renderPhaseInfo(pi){
  const p=PHASES[pi];
  let ah='';
  p.allures.forEach(a=>{ah+=`<div class="allure-card" style="background:${a.bg}"><div class="allure-label" style="color:${a.color}">${a.label}</div><div class="allure-val" style="color:${a.color}">${a.val}</div><div class="allure-fc" style="color:${a.color}">${a.fc}</div></div>`;});
  document.getElementById('phaseInfo').innerHTML=`<div class="phase-info">
    <div class="phase-title">${p.emoji} ${p.name}</div>
    <div class="phase-meta"><span>${p.duration}</span><span>${p.volume}</span><span>${p.sessions}</span></div>
    <div class="phase-desc">${p.desc}</div>
    <div class="allure-grid">${ah}</div>
  </div>`;
}

function renderWeekNav(pi){
  const nav=document.getElementById('weekNav');
  nav.innerHTML='';
  PHASES[pi].weeks.forEach((w,i)=>{
    const b=document.createElement('button');
    const isRace=w.isRace||false;
    b.className='week-btn'+(isRace?' race-week':'')+(i===currentWeek?' active':'');
    b.textContent=w.label.length>8?w.label.replace('Semaine ','S'):w.label;
    b.onclick=()=>{currentWeek=i;document.querySelectorAll('.week-btn').forEach((bb,j)=>bb.classList.toggle('active',j===i));renderWeek(pi,i);};
    nav.appendChild(b);
  });
}

function renderWeek(pi,wi){
  const p=PHASES[pi];
  const w=p.weeks[wi];
  const vcMap={p1:'vol-p1',gsc:'vol-pgsc',p2:'vol-p2',p3:'vol-p2'};
  const vc=vcMap[p.id]||'vol-p1';
  let h=`<div class="week-header">
    <span class="week-title">${w.label}</span>
    <span class="week-vol">${w.vol}</span>
    ${w.dates?`<span class="week-dates">${w.dates}</span>`:''}
  </div>
  <div class="vol-track"><div class="vol-fill ${vc}" style="width:${w.volPct}%"></div></div>
  <div class="focus-box ${w.isRace?'race':''}">${w.focus}</div>
  <div class="section-label">Planning</div>`;
  w.days.forEach(d=>{
    h+=`<div class="day-card${d.isRace?' race-day':''} i-${d.type}">
      <div class="day-head">
        <div class="day-icon"><i class="${d.icon}"></i></div>
        <span class="day-name">${d.day}</span>
        <span class="badge">${d.badge}</span>
      </div>
      <div class="day-detail">${d.detail}</div>
    </div>`;
  });
  document.getElementById('weekContent').innerHTML=h;
}

function renderGarmin(pi){
  const p=PHASES[pi];
  const items=p.garmin.map(g=>`<li><span class="workout-name">${g}</span></li>`).join('');
  document.getElementById('garminSection').innerHTML=`<div class="garmin-section">
    <div class="garmin-title"><i class="fa-solid fa-clock-rotate-left"></i> Séances Garmin — ${p.name}</div>
    <ul class="garmin-list">${items}</ul>
  </div>`;
}

function switchPhase(pi){
  currentPhase=pi; currentWeek=0;
  document.querySelectorAll('.phase-tab').forEach((t,i)=>t.classList.toggle('active',i===pi));
  renderPhaseInfo(pi); renderCountdown(); renderWeekNav(pi); renderWeek(pi,0); renderGarmin(pi);
}

const tabs=document.getElementById('phaseTabs');
PHASES.forEach((p,i)=>{
  const t=document.createElement('button');
  t.className='phase-tab';
  t.innerHTML=`<span class="tab-emoji">${p.emoji}</span>${p.label}`;
  t.onclick=()=>switchPhase(i);
  tabs.appendChild(t);
});
switchPhase(0);
</script>
